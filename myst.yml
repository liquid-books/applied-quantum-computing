# MyST project configuration
# Docs: https://mystmd.org/guide/configuration
version: 1
project:
  title: "Applied Quantum Computing: A Leader's Guide to the Next Computing Revolution"
  subtitle: "Quantum-Enabled Business Strategy: Optimization, Analytics, and Emerging Applications"
  authors:
    - name: Dr. Ernesto Lee
  description: >
    A graduate-level masterclass in quantum computing for MBA students, executives,
    consultants, and policy professionals. Nine chapters, nine hands-on labs, and
    a complete quantum-readiness strategy framework — no physics background required.
  keywords:
    - quantum computing
    - business strategy
    - MBA
    - quantum readiness
    - post-quantum cryptography
    - quantum economics
    - NISQ
    - quantum optimization
    - quantum simulation
    - quantum AI
  license: CC-BY-4.0
  open_access: true
  github: https://github.com/liquid-books/applied-quantum-computing
  # Numbering
  numbering:
    heading_1: true
    heading_2: true
    heading_3: true
    figure: true
    table: true
    equation: true
  exports:
    - format: pdf
  # Table of contents
  toc:
    - file: index.md
    - part: "Chapters"
      chapters:
        - title: "Chapter 1: The $850 Billion Question"
          file: chapters/ch01-why-quantum-why-now.md
        - title: "Chapter 2: The Quantum Mindset"
          file: chapters/ch02-thinking-in-probabilities.md
        - title: "Chapter 3: The Quantum Cloud Economy"
          file: chapters/ch03-bits-to-qubits-economics.md
        - title: "Chapter 4: The Quantum Hardware Race"
          file: chapters/ch04-hardware-race.md
        - title: "Chapter 5: The Cryptocalypse"
          file: chapters/ch05-cryptocalypse-y2q.md
        - title: "Chapter 6: The Optimization Goldmine"
          file: chapters/ch06-optimization-goldmine.md
        - title: "Chapter 7: Quantum Industry Verticals"
          file: chapters/ch07-simulation-revolution.md
        - title: "Chapter 8: Quantum + AI"
          file: chapters/ch08-quantum-ai-hybrid.md
        - title: "Chapter 9: The Quantum-Ready Enterprise"
          file: chapters/ch09-quantum-ready-enterprise.md
    - part: "Appendices"
      chapters:
        - title: "Appendix A: Glossary"
          file: chapters/appendix-a-glossary.md
        - title: "Appendix B: Quantum Bookshelf"
          file: chapters/appendix-b-bookshelf.md
        - title: "Appendix C: Vendor-Neutral Evaluation Rubric"
          file: chapters/appendix-c-evaluation-rubric.md
        - title: "Appendix D: Supplementary Case Library"
          file: chapters/appendix-d-case-library.md
        - title: "Appendix E: Assessment Toolkit"
          file: chapters/appendix-e-assessment-toolkit.md
        - title: "Appendix F: Market Snapshot"
          file: chapters/appendix-f-market-snapshot.md
        - title: "Appendix G: Lab Setup Guide"
          file: chapters/appendix-g-lab-setup.md

site:
